version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-reviewer-db
    environment:
      POSTGRES_USER: reviewer_user
      POSTGRES_PASSWORD: reviewer_password
      POSTGRES_DB: ai_reviewer_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-reviewer-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
